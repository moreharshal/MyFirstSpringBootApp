name: Forward PR Review to External App

on:
  pull_request_review:
    types: [submitted, edited, dismissed]

jobs:
  forward-review:
    runs-on: ubuntu-latest

    steps:
      - name: Send PR Review to External App
        env:
          REVIEW_BODY: ${{ github.event.review.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PAYLOAD=$(jq -n 
            --arg event "pull_request_review" 
            --arg action "${{ github.event.review.state }}" 
            --argjson pr_number ${{ github.event.pull_request.number }} 
            --arg pr_title "$PR_TITLE" 
            --arg pr_url "${{ github.event.pull_request.html_url }}" 
            --arg reviewer "${{ github.event.review.user.login }}" 
            --arg review_body "$REVIEW_BODY" 
            --arg review_state "${{ github.event.review.state }}" 
            --arg repo "${{ github.repository }}" 
            --arg submitted_at "${{ github.event.review.submitted_at }}" 
            '{
              event: $event,
              action: $action,
              pr_number: $pr_number,
              pr_title: $pr_title,
              pr_url: $pr_url,
              reviewer: $reviewer,
              review_body: $review_body,
              review_state: $review_state,
              repo: $repo,
              submitted_at: $submitted_at
            }')

          curl -X POST https://hangnail-used-emergency.ngrok-free.dev/api/webhooks/c6ad61a3-6933-4100-a6bb-9c5e254b58be 
            -H "Content-Type: application/json" 
            -d "$PAYLOAD"
