name: Forward PR Review as Webhook Event

on:
  pull_request_review:
    types: [submitted, edited, dismissed]

jobs:
  forward-review:
    runs-on: ubuntu-latest

    steps:
      - name: Sign and forward PR review webhook
        env:
          # Only the fields the backend normalizer reads are forwarded.
          # The reviewer login is placed in pull_request.user.login so it
          # normalizes into the `author` field that the trigger filters on.
          EVENT: ${{ toJSON(github.event) }}
          ACTION: ${{ github.event.action }}
          REPO: ${{ github.repository }}
          CLONE_URL: ${{ github.event.repository.clone_url }}
          REVIEWER: ${{ github.event.review.user.login }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          set -euo pipefail

          # Build the minimal GitHub-shaped payload. Every key here maps to a
          # field in the backend's normalize_event(); nothing else is read.
          PAYLOAD=$(jq -n \
            --argjson event "$EVENT" \
            --arg action "$ACTION" \
            --arg repo "$REPO" \
            --arg clone_url "$CLONE_URL" \
            --arg reviewer "$REVIEWER" \
            '{
              action: $action,
              repository: { full_name: $repo, clone_url: $clone_url },
              pull_request: {
                number: $event.pull_request.number,
                title:  $event.pull_request.title,
                body:   $event.pull_request.body,
                user:   { login: $reviewer },
                base:   { ref: $event.pull_request.base.ref },
                head:   { ref: $event.pull_request.head.ref, sha: $event.pull_request.head.sha }
              }
            }')

          # Sign the payload with the webhook secret (same scheme as GitHub).
          SIGNATURE="sha256=$(printf '%s' "$PAYLOAD" | \
            openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | \
            awk '{print $NF}')"

          # Forward as a GitHub-style webhook event.
          curl --fail-with-body -sS -X POST \
            https://hangnail-used-emergency.ngrok-free.dev/api/webhooks/c6ad61a3-6933-4100-a6bb-9c5e254b58be \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: pull_request_review" \
            -H "X-GitHub-Delivery: ${RUN_ID}-${RUN_ATTEMPT}" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -H "User-Agent: GitHub-Hookshot/actions" \
            -d "$PAYLOAD"
